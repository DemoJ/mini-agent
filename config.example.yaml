# ============================================================
# LLM API 配置
# ============================================================
# 支持任何兼容 OpenAI API 格式的服务（OpenAI、Azure、本地 ollama/vLLM 等）
# 使用前请复制此文件为 config.yaml 并填入真实配置

api:
  base_url: "https://api.openai.com/v1"   # API 端点
  api_key: "YOUR_API_KEY_HERE"            # API Key（必填）
  model: "gpt-4o"                         # 模型名称
  vision: true                            # 模型是否支持视觉能力（多模态）。开启后图片以 base64 发送给模型

# ============================================================
# Agent 行为配置
# ============================================================
agent:
  max_steps: 10          # 最大循环步数
  temperature: 0.7       # LLM 温度参数
  max_tokens: 4096       # 每次生成的最大 token 数
  reasoning_effort: ~    # 思考模式: "none"/null=关闭, "minimal"/"low"/"medium"/"high"/"xhigh"=对应深度
  system_prompt: "prompt/system.md"    # 系统提示词（支持 .md 文件路径或直接文本）
  user_prompt: "prompt/user.md"        # 用户提示词模板，可用 {task} 占位
  skills_dir: "skills"   # skill 包目录，可写单字符串或列表（多目录，每项相对于配置文件）；靠前的目录优先级更高
                          # 多目录示例：
                          #   skills_dir:
                          #     - "skills"
                          #     - "skills_extra"

# ============================================================
# 调试日志配置
# ============================================================
# 用于监测发送给 LLM 的实际内容是否符合预期
debug:
  log_llm_request: false   # 是否打印发送给 LLM 的请求内容（system prompt + messages + tools）
  log_llm_response: false  # 是否打印 LLM 的响应内容
  log_tools: true          # 是否在请求日志中包含 OpenAI tools 函数定义
  log_to_file: false       # 是否同时写入日志文件
  log_file: "logs/llm_debug.log"   # 日志文件路径（相对于配置文件）
