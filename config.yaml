# ============================================================
# LLM API 配置
# ============================================================
# 支持任何兼容 OpenAI API 格式的服务（OpenAI、Azure、本地 ollama/vLLM 等）

api:
  base_url: "https://api.openai.com/v1"   # API 端点
  api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"   # API Key
  model: "gpt-4o"                         # 模型名称

# ============================================================
# Agent 行为配置
# ============================================================
agent:
  max_steps: 10          # 最大循环步数
  temperature: 0.7       # LLM 温度参数
  max_tokens: 4096       # 每次生成的最大 token 数
  system_prompt: |
    你是一个只能通过工具来与环境交互的 AI 助手。

    ## 可用工具

    {tools_desc}

    ## 规则

    1. 你只能使用上面列出的工具来完成任务
    2. 每次生成一个工具调用，等待结果后再决定下一步
    3. 当你完成任务时，调用 finish 工具并填写最终答案

    ## 任务

    {task}